---
- name: Validate ng-soar install mode
  ansible.builtin.assert:
    that:
      - ng_soar_install_mode in ['preinstalled', 'package', 'container', 'artifact']
    fail_msg: "ng_soar_install_mode={{ ng_soar_install_mode }} inválido. Usa preinstalled|package|container|artifact."

- name: Validate NG-SOAR sensitive secrets
  ansible.builtin.assert:
    that:
      - (ng_soar_integrations | default([])) | selectattr('name', 'equalto', 'siem_ingest') | map(attribute='token') | first | default('') | string | trim | length > 0
      - ((ng_soar_integrations | default([])) | selectattr('name', 'equalto', 'siem_ingest') | map(attribute='token') | first | default('') | string | trim | lower) != 'changeme'
    fail_msg: "Falta secreto real para ng_soar_integrations[siem_ingest].token (Vault o NG_SOAR_SIEM_INGEST_TOKEN)."
    quiet: true
  no_log: true

- name: Ensure ng-soar group exists
  ansible.builtin.group:
    name: ng-soar
    state: present

- name: Ensure ng-soar service user exists
  ansible.builtin.user:
    name: ng-soar
    group: ng-soar
    system: true
    create_home: false

- name: Ensure ng-soar configuration directory exists
  ansible.builtin.file:
    path: "{{ ng_soar_queue_config | dirname }}"
    state: directory
    owner: root
    group: ng-soar
    mode: "0750"

- name: Deploy ng-soar queue definitions
  ansible.builtin.template:
    src: queues.yaml.j2
    dest: "{{ ng_soar_queue_config }}"
    owner: root
    group: ng-soar
    mode: "0640"
  notify: restart ng-soar
  no_log: true

- name: Check for ng-soarctl binary
  ansible.builtin.stat:
    path: "{{ ng_soarctl_binary_path }}"
  register: ng_soarctl

- name: Assert ng-soarctl exists for non-container mode
  ansible.builtin.assert:
    that:
      - ng_soarctl.stat.exists
    fail_msg: "Falta {{ ng_soarctl_binary_path }} en host {{ inventory_hostname }} para install_mode={{ ng_soar_install_mode }}"
  when: ng_soar_install_mode in ['preinstalled', 'package']

- name: Validate ng-soar queues
  ansible.builtin.command: "{{ ng_soarctl_binary_path }} validate --config {{ ng_soar_queue_config }}"
  register: ng_soar_validation
  changed_when: false
  failed_when: ng_soar_validation.rc != 0
  when: ng_soar_install_mode in ['preinstalled', 'package']

- name: Check ng-soar API health
  ansible.builtin.uri:
    url: "{{ ng_soar_healthcheck.url }}"
    method: GET
    status_code: "{{ ng_soar_healthcheck.status_code | int }}"
  register: ng_soar_health
  failed_when: ng_soar_health.status != ng_soar_healthcheck.status_code
  changed_when: false
  when: ng_soar_install_mode in ['preinstalled', 'package']

- name: Deploy NG-SOAR container stack
  ansible.builtin.import_tasks: docker-deploy.yml
  when: ng_soar_install_mode in ['container', 'artifact']
