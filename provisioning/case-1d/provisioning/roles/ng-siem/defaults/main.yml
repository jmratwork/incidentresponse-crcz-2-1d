---
ng_siem_install_mode: container
ng_siemctl_path: /usr/bin/ng-siemctl
ng_siem_pipeline_config: /etc/ng-siem/pipelines.d/rep.conf
ng_siem_pipeline:
  name: rep_ingest
  sources:
    - name: telemetry_feeder
      type: tcp
      listen: 0.0.0.0:5514
    - name: cti_taxii
      type: taxii
      url: https://cti-ss.internal/taxii/
      collection: rep-threats
      username: siem-ingestor
      password: "{{ lookup('env', 'NG_SIEM_TAXII_PASSWORD') | default('changeme', true) }}"
  enrichments:
    - type: geoip
      database: /usr/share/GeoIP/GeoLite2-City.mmdb
    - type: threat_lookup
      table: rep-threats
  outputs:
    - type: elasticsearch
      hosts:
        - https://es-gateway.internal:9200
      index: rep-alerts-{{ '%Y.%m.%d' | strftime }}
ng_siem_healthcheck:
  command: "{{ ng_siemctl_path }} pipeline status {{ ng_siem_pipeline.name }}"

ng_siem_compose_source:
  type: smb
  share: "//10.250.232.198/shared"
  mount_point: /mnt/ng-siem
  mount_opts: guest,vers=3.0
  compose_path: /mnt/ng-siem/ng-siem/docker-compose.yml
  archive_path: /mnt/ng-siem/ng-siem/docker-compose.zip
  archive: false
  destination_dir: /opt/ng-siem

ng_siem_compose_local_path: "{{ playbook_dir }}/../../../../artifacts/ng-siem/docker-compose.yml"
ng_siem_compose_url: ""

ng_siem_registry:
  url: https://index.docker.io/v1/
  username: ""
  password: ""
