---
cti_ss_taxii_config: /etc/cti-ss/taxii.yaml
cti_ss_taxii_collections:
  - id: rep-threats
    title: REP Threat Intelligence
    description: Indicators collected during the REP exercise
    can_read: ["ng-siem", "ng-soar"]
    can_write: ["telemetry-feeder"]

cti_ss_taxii_siem_ingestor_password: "{{ lookup('env', 'CTI_SS_TAXII_SIEM_INGESTOR_PASSWORD') | default('', true) }}"
cti_ss_taxii_telemetry_feeder_password: "{{ lookup('env', 'CTI_SS_TAXII_TELEMETRY_FEEDER_PASSWORD') | default('', true) }}"
cti_ss_auth:
  users:
    - username: siem-ingestor
      password: "{{ cti_ss_taxii_siem_ingestor_password }}"
      permissions: ["rep-threats:read"]
    - username: telemetry-feeder
      password: "{{ cti_ss_taxii_telemetry_feeder_password }}"
      permissions: ["rep-threats:write"]

cti_ss_bind_host: 0.0.0.0
cti_ss_bind_port: 9000
cti_ss_healthcheck_command: "/usr/bin/cti-ssctl status"
cti_ss_enable_healthchecks: false

# External compose source (SMB/CIFS share)
cti_ss_compose_source:
  share: "//fileserver/cti-ss"
  mount_point: "/mnt/cti-ss"
  mount_opts: "guest,ro,vers=3.0"

# Container registry settings (keep secrets in env/vault)
cti_ss_registry:
  url: "https://index.docker.io/v1/"
  username: "{{ lookup('env', 'CTI_SS_REGISTRY_USERNAME') | default('', true) }}"
  password: "{{ lookup('env', 'CTI_SS_REGISTRY_PASSWORD') | default('', true) }}"

# Docker apt repository settings
cti_ss_docker_repo_url: "https://download.docker.com/linux/ubuntu"
cti_ss_docker_apt_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] {{ cti_ss_docker_repo_url }} {{ ansible_distribution_release }} stable"

# MISP deployment settings
cti_ss_misp_repo: "https://github.com/MISP/misp-docker.git"
cti_ss_misp_repo_version: "main"
cti_ss_misp_project_dir: "/opt/misp-docker"
cti_ss_misp_url: "https://localhost"
cti_ss_misp_http_port: "80"
cti_ss_misp_https_port: "443"
cti_ss_misp_container_core_name: "misp-core"
cti_ss_misp_admin_user: "admin@admin.test"
cti_ss_misp_api_key_regex: "(?i)new key created:\\s*([A-Za-z0-9]{40})"

# Cross-role fact sharing settings
cti_ss_fact_delegate_host: "localhost"
