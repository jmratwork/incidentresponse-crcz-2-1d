---
- name: Ensure CTI sharing service directory exists
  ansible.builtin.file:
    path: "{{ cti_ss_taxii_config | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Configure TAXII collections
  ansible.builtin.template:
    src: taxii.yaml.j2
    dest: "{{ cti_ss_taxii_config }}"
    owner: root
    group: root
    mode: "0640"
  notify: restart cti sharing service
  no_log: true

- name: Check if cti-ssctl binary is present
  ansible.builtin.stat:
    path: /usr/bin/cti-ssctl
  register: cti_ssctl

- name: Validate CTI sharing daemon configuration
  ansible.builtin.command: "cti-ssctl configtest --config {{ cti_ss_taxii_config }}"
  register: cti_ss_configtest
  changed_when: false
  failed_when: cti_ss_configtest.rc != 0
  when:
    - cti_ss_enable_healthchecks
    - cti_ssctl.stat.exists

- name: Check CTI sharing service status
  ansible.builtin.command: "{{ cti_ss_healthcheck_command }}"
  register: cti_ss_status
  changed_when: false
  failed_when: cti_ss_status.rc != 0 or 'running' not in cti_ss_status.stdout.lower()
  when:
    - cti_ss_enable_healthchecks
    - cti_ssctl.stat.exists

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - smbclient
      - cifs-utils
      - unzip
    state: present
    update_cache: true

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ cti_ss_docker_repo_url }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "{{ cti_ss_docker_apt_repo }}"
    filename: docker
    state: present

- name: Update APT cache after adding repository
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create mount point
  ansible.builtin.file:
    path: "{{ cti_ss_compose_source.mount_point }}"
    state: directory
    mode: "0775"

- name: Mount SMB Share (guest)
  ansible.builtin.mount:
    src: "{{ cti_ss_compose_source.share }}"
    path: "{{ cti_ss_compose_source.mount_point }}"
    fstype: cifs
    opts: "{{ cti_ss_compose_source.mount_opts }}"
    state: mounted

- name: Create MISP directory for the git repo
  ansible.builtin.file:
    path: "{{ cti_ss_misp_project_dir }}"
    state: directory
    mode: "0755"

- name: Login to Docker registry
  community.docker.docker_login:
    registry_url: "{{ cti_ss_registry.url }}"
    username: "{{ cti_ss_registry.username }}"
    password: "{{ cti_ss_registry.password }}"
  when:
    - cti_ss_registry.username | default('') | trim | length > 0
    - cti_ss_registry.password | default('') | trim | length > 0
  no_log: true

- name: Download MISP docker
  ansible.builtin.git:
    repo: "{{ cti_ss_misp_repo }}"
    dest: "{{ cti_ss_misp_project_dir }}"
    version: "{{ cti_ss_misp_repo_version }}"

- name: Copy MISP env
  ansible.builtin.copy:
    src: "{{ cti_ss_misp_project_dir }}/template.env"
    dest: "{{ cti_ss_misp_project_dir }}/.env"
    remote_src: true

- name: Change env http port for MISP
  ansible.builtin.lineinfile:
    path: "{{ cti_ss_misp_project_dir }}/.env"
    regexp: '^#?\s*CORE_HTTP_PORT='
    line: "CORE_HTTP_PORT={{ cti_ss_misp_http_port }}"
    state: present

- name: Change env https port for MISP
  ansible.builtin.lineinfile:
    path: "{{ cti_ss_misp_project_dir }}/.env"
    regexp: '^#?\s*CORE_HTTPS_PORT='
    line: "CORE_HTTPS_PORT={{ cti_ss_misp_https_port }}"
    state: present

- name: Change BASE_URL in env for MISP
  ansible.builtin.lineinfile:
    path: "{{ cti_ss_misp_project_dir }}/.env"
    regexp: '^#?\s*BASE_URL='
    line: "BASE_URL={{ cti_ss_misp_url }}"
    state: present
    insertafter: EOF
    backup: true

- name: Deployment of MISP Docker
  community.docker.docker_compose_v2:
    project_src: "{{ cti_ss_misp_project_dir }}"
    state: present
    build: always
  register: misp_output

- name: Wait for MISP core container readiness
  community.docker.docker_container_info:
    name: "{{ cti_ss_misp_container_core_name }}"
  register: cti_ss_misp_core_info
  retries: 30
  delay: 10
  until:
    - cti_ss_misp_core_info.exists
    - cti_ss_misp_core_info.container is defined
    - cti_ss_misp_core_info.container.State is defined
    - cti_ss_misp_core_info.container.State.Running | default(false)

- name: Get or generate MISP API key for admin user
  community.docker.docker_container_exec:
    container: "{{ cti_ss_misp_container_core_name }}"
    command: "/var/www/MISP/app/Console/cake user change_authkey {{ cti_ss_misp_admin_user }}"
  register: misp_user_info
  no_log: true

- name: Parse MISP API key
  ansible.builtin.set_fact:
    cti_ss_misp_api_key: >-
      {{
        (
          (misp_user_info.stdout | default('')) ~ '\n' ~ (misp_user_info.stderr | default(''))
        )
        | regex_search(cti_ss_misp_api_key_regex, '\\1')
        | default('')
      }}
    cacheable: true
  no_log: true

- name: Share MISP API key fact
  ansible.builtin.set_fact:
    cti_ss_misp_api_key: "{{ cti_ss_misp_api_key }}"
    cacheable: true
  delegate_to: "{{ cti_ss_fact_delegate_host }}"
  delegate_facts: true
  no_log: true
