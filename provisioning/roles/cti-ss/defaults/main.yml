---
cti_ss_taxii_config: /etc/cti-ss/taxii.yaml
cti_ss_taxii_collections:
  - id: rep-threats
    title: REP Threat Intelligence
    description: Indicators collected during the REP exercise
    can_read: ["ng-siem", "ng-soar"]
    can_write: ["telemetry-feeder"]

# Canonical CTI-SS secret names.
# Temporary backward-compatible aliases:
# - cti_ss_taxii_siem_password
# - cti_ss_taxii_telemetry_password
cti_ss_taxii_siem_ingestor_password: "{{ cti_ss_taxii_siem_password | default(lookup('env', 'CTI_SS_TAXII_SIEM_INGESTOR_PASSWORD') | default(lookup('env', 'CTI_SS_TAXII_SIEM_PASSWORD') | default('', true), true), true) }}"
cti_ss_taxii_telemetry_feeder_password: "{{ cti_ss_taxii_telemetry_password | default(lookup('env', 'CTI_SS_TAXII_TELEMETRY_FEEDER_PASSWORD') | default(lookup('env', 'CTI_SS_TAXII_TELEMETRY_PASSWORD') | default('', true), true), true) }}"
cti_ss_taxii_siem_password: "{{ cti_ss_taxii_siem_ingestor_password }}"
cti_ss_taxii_telemetry_password: "{{ cti_ss_taxii_telemetry_feeder_password }}"

cti_ss_auth:
  users:
    - username: siem-ingestor
      password: "{{ cti_ss_taxii_siem_ingestor_password }}"
      permissions: ["rep-threats:read"]
    - username: telemetry-feeder
      password: "{{ cti_ss_taxii_telemetry_feeder_password }}"
      permissions: ["rep-threats:write"]

cti_ss_bind_host: 0.0.0.0
cti_ss_bind_port: 9000
cti_ss_healthcheck_command: "/usr/bin/cti-ssctl status"
cti_ss_enable_healthchecks: false
cti_ssctl_binary_path: /usr/bin/cti-ssctl

cti_ss_docker_apt_gpg_url: https://download.docker.com/linux/ubuntu/gpg
cti_ss_docker_apt_repo: "deb [arch={{ (ansible_architecture | default('amd64')) | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

# Canonical registry credentials. Backward compatibility:
# - cti_ss_docker_password
# - CTI_SS_DOCKER_PASSWORD
cti_ss_registry_url: https://index.docker.io/v1/
cti_ss_registry_username: "{{ lookup('env', 'CTI_SS_REGISTRY_USERNAME') | default('', true) }}"
cti_ss_registry_password: "{{ cti_ss_docker_password | default(lookup('env', 'CTI_SS_REGISTRY_PASSWORD') | default(lookup('env', 'CTI_SS_DOCKER_PASSWORD') | default('', true), true), true) }}"
cti_ss_docker_password: "{{ cti_ss_registry_password }}"
cti_ss_registry:
  url: "{{ cti_ss_registry_url }}"
  username: "{{ cti_ss_registry_username }}"
  password: "{{ cti_ss_registry_password }}"

cti_ss_misp_repo: "https://github.com/MISP/misp-docker.git"
cti_ss_misp_repo_version: main
cti_ss_misp_project_dir: /opt/misp-docker
cti_ss_misp_env_template: "{{ cti_ss_misp_project_dir }}/template.env"
cti_ss_misp_env_file: "{{ cti_ss_misp_project_dir }}/.env"
cti_ss_misp_http_port: 8082
cti_ss_misp_https_port: 8443
cti_ss_misp_base_url: "https://10.30.30.10:8443"
cti_ss_misp_admin_user: admin@admin.test
cti_ss_misp_core_container: misp-docker-misp-core-1
cti_ss_misp_api_key_share_host: localhost
cti_ss_misp_api_key_regex: "([a-fA-F0-9]{40})"
cti_ss_misp_wait_retries: 20
cti_ss_misp_wait_delay: 10
