---
cti_ss_taxii_config: /etc/cti-ss/taxii.yaml
cti_ss_taxii_collections:
  - id: rep-threats
    title: REP Threat Intelligence
    description: Indicators collected during the REP exercise
    can_read: ["ng-siem", "ng-soar"]
    can_write: ["telemetry-feeder"]
cti_ss_auth:
  users:
    - username: siem-ingestor
      password: changeme
      permissions: ["rep-threats:read"]
    - username: telemetry-feeder
      password: changeme
      permissions: ["rep-threats:write"]
cti_ss_bind_host: 0.0.0.0
cti_ss_bind_port: 9000
cti_ss_healthcheck_command: "/usr/bin/cti-ssctl status"

cti_ss_compose_source:
  share: "//10.250.232.198/shared"
  mount_point: /mnt/smb_shared
  mount_opts: guest,vers=3.0

cti_ss_registry:
  url: https://index.docker.io/v1/
  username: demongsoc

cti_ss_misp_repo: "https://github.com/MISP/misp-docker.git"
cti_ss_misp_repo_version: master
cti_ss_misp_project_dir: /opt/misp-docker
cti_ss_misp_http_port: 8082
cti_ss_misp_https_port: 8443
cti_ss_misp_base_url: "https://10.30.30.10:8443"
cti_ss_misp_admin_user: admin@admin.test
cti_ss_misp_core_container: misp-docker-misp-core-1
