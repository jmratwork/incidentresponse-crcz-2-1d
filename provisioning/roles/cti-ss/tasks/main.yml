- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - smbclient
      - cifs-utils
      - unzip
    state: present
    update_cache: yes

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ (ansible_architecture | default('amd64')) | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create mount point
  ansible.builtin.file:
    path: "{{ cti_ss_compose_source.mount_point }}"
    state: directory
    mode: "0775"
    
- name: Mount SMB Share (guest)
  ansible.builtin.mount:
    src: "{{ cti_ss_compose_source.share }}"
    path: "{{ cti_ss_compose_source.mount_point }}"
    fstype: cifs
    opts: "{{ cti_ss_compose_source.mount_opts }}"
    state: mounted

- name: Create MISP directory for the git repo
  ansible.builtin.file:
    path: "{{ cti_ss_misp_project_dir }}"
    state: directory
    mode: "0755"

- name: Login to Docker Hub
  community.docker.docker_login:
    registry_url: "{{ cti_ss_registry.url }}"
    username: "{{ cti_ss_registry.username }}"
    password: "{{ cti_ss_docker_password }}"
  when: cti_ss_registry.username | length > 0
  no_log: true

- name: Download MISP docker
  ansible.builtin.git:
    repo: "{{ cti_ss_misp_repo }}"
    dest: "{{ cti_ss_misp_project_dir }}"
    version: "{{ cti_ss_misp_repo_version }}"
  
- name: Copy MISP env
  ansible.builtin.copy:
    src: "{{ cti_ss_misp_project_dir }}/template.env"
    dest: "{{ cti_ss_misp_project_dir }}/.env"
    remote_src: true

- name: Change env http port for MISP
  ansible.builtin.lineinfile:
    path: "{{ cti_ss_misp_project_dir }}/.env"
    regexp: '^#?\s*CORE_HTTP_PORT='
    line: "CORE_HTTP_PORT={{ cti_ss_misp_http_port }}"
    state: present

- name: Change env https port for MISP
  ansible.builtin.lineinfile:
    path: "{{ cti_ss_misp_project_dir }}/.env"
    regexp: '^#?\s*CORE_HTTPS_PORT='
    line: "CORE_HTTPS_PORT={{ cti_ss_misp_https_port }}"
    state: present

- name: Change BASE_URL in env for MISP
  ansible.builtin.lineinfile:
    path: "{{ cti_ss_misp_project_dir }}/.env"
    regexp: '^#?\s*BASE_URL='
    line: "BASE_URL={{ cti_ss_misp_base_url }}"
    state: present
    insertafter: EOF
    backup: true

- name: Deployment of MISP Docker
  community.docker.docker_compose_v2:
    project_src: "{{ cti_ss_misp_project_dir }}"
    state: present
    build: always
  register: cti_ss_misp_output

- name: Get or generate MISP API key for admin user
  community.docker.docker_container_exec:
    container: "{{ cti_ss_misp_core_container }}"
    command: "/var/www/MISP/app/Console/cake user change_authkey {{ cti_ss_misp_admin_user }}"
  register: cti_ss_misp_user_info
  no_log: true

- name: Save MISP API key fact for cross-role reuse
  ansible.builtin.set_fact:
    cti_ss_misp_api_key: "{{ cti_ss_misp_user_info.stdout.split('Old authentication keys disabled and new key created: ')[1] | trim }}"
    cacheable: true
  no_log: true

- name: Unmount CTI-SS SMB share
  ansible.builtin.mount:
    path: "{{ cti_ss_compose_source.mount_point }}"
    state: unmounted
