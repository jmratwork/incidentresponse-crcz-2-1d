---
cicms_nginx_site:
  listen: 8443
  server_name: cicms.internal
  root: /srv/cicms/public
  healthcheck_path: /status
  upstreams:
    - 127.0.0.1:9201
cicms_tls:
  certificate_path: /etc/nginx/tls/cicms.crt
  key_path: /etc/nginx/tls/cicms.key
  certificate_content: ""
  key_content: ""
cicms_cms_config_path: /etc/cicms/settings.json
cicms_cms_settings:
  notification_channel: teams
  upstream_smtp: smtp.internal:587
  taxonomy_feed: https://cti-ss.internal/taxii/
  approval_workflow: two_person_rule
cicms_healthcheck:
  url: https://127.0.0.1:8443/status
  status_code: 200
  validate_certs: false
cicms_enable_nginx_checks: false
cicms_nginx_binary_path: /usr/sbin/nginx

cicms_compose_source:
  share: "//fileserver/shared"
  mount_point: /mnt/smb_shared
  mount_opts: guest,vers=3.0
  archive_path: /mnt/smb_shared/dfir-iris-custom.zip
cicms_docker_apt_gpg_url: https://download.docker.com/linux/ubuntu/gpg
cicms_docker_apt_repo: "deb [arch={{ (ansible_architecture | default('amd64')) | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

cicms_dfir_archive_dest: /opt/dfir-iris-custom.zip
cicms_dfir_extract_dir: /opt/
cicms_dfir_project_dir: /opt/dfir-iris-custom
cicms_dfir_env_file: "{{ cicms_dfir_project_dir }}/.env"

cicms_registry:
  url: https://index.docker.io/v1/
  username: ""
  password: "{{ lookup('env', 'CICMS_DOCKER_PASSWORD') }}"

cicms_iris_misp_url: https://10.30.30.10:8443
cicms_iris_misp_verify_cert: false
cicms_misp_api_key_host: localhost
cicms_misp_api_key_fact_name: cti_ss_misp_api_key
