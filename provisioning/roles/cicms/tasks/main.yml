- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - smbclient
      - cifs-utils
      - unzip
    state: present
    update_cache: yes

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ cicms_docker_apt_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "{{ cicms_docker_apt_repo }}"
    state: present
    filename: docker
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create mount point
  ansible.builtin.file:
    path: "{{ cicms_compose_source.mount_point }}"
    state: directory
    mode: "0775"
    
- name: Mount SMB Share (guest)
  ansible.builtin.mount:
    src: "{{ cicms_compose_source.share }}"
    path: "{{ cicms_compose_source.mount_point }}"
    fstype: cifs
    opts: "{{ cicms_compose_source.mount_opts }}"
    state: mounted

- name: Copy DFIR-IRIS zip from SMB to destination
  ansible.builtin.copy:
    src: "{{ cicms_compose_source.archive_path }}"
    dest: "{{ cicms_dfir_archive_dest }}"
    remote_src: true
    mode: "0644"

- name: Unzip DFIR-IRIS Docker
  ansible.builtin.unarchive:
    src: "{{ cicms_dfir_archive_dest }}"
    dest: "{{ cicms_dfir_extract_dir }}"
    remote_src: true
    extra_opts: ["-o"]

- name: Login to Docker Hub
  community.docker.docker_login:
    registry_url: "{{ cicms_registry.url }}"
    username: "{{ cicms_registry.username }}"
    password: "{{ cicms_registry.password }}"
  when: cicms_registry.username | length > 0
  no_log: true

- name: Ensure MISP API key is available from cti-ss role
  ansible.builtin.assert:
    that:
      - >
        (
          hostvars[cicms_misp_api_key_host].cti_ss_misp_api_key
          | default(hostvars[groups['cti-ss'][0]].cti_ss_misp_api_key | default(''))
        ) | length > 0
    fail_msg: "MISP API key missing. Run cti-ss role successfully before cicms."

- name: Resolve MISP API key source for CICMS
  ansible.builtin.set_fact:
    cicms_misp_api_key: >-
      {{
        hostvars[cicms_misp_api_key_host].cti_ss_misp_api_key
        | default(hostvars[groups['cti-ss'][0]].cti_ss_misp_api_key | default(''))
      }}
  no_log: true

- name: Inject MISP integration settings into DFIR-IRIS .env
  ansible.builtin.lineinfile:
    path: "{{ cicms_dfir_project_dir }}/.env"
    regexp: '^IRIS_MISP_URL='
    line: "IRIS_MISP_URL={{ cicms_iris_misp_url }}"
    state: present

- name: Disable SSL verification for MISP connection
  ansible.builtin.lineinfile:
    path: "{{ cicms_dfir_project_dir }}/.env"
    regexp: '^IRIS_MISP_VERIFY_CERT='
    line: "IRIS_MISP_VERIFY_CERT={{ cicms_iris_misp_verify_cert | ternary('true', 'false') }}"
    state: present

- name: Inject MISP key into DFIR-IRIS .env
  ansible.builtin.lineinfile:
    path: "{{ cicms_dfir_project_dir }}/.env"
    regexp: '^IRIS_MISP_KEY='
    line: "IRIS_MISP_KEY={{ cicms_misp_api_key }}"
    state: present
  no_log: true

- name: Build and run DFIR-IRIS
  community.docker.docker_compose_v2:
    project_src: "{{ cicms_dfir_project_dir }}"
    state: present
    build: always
  register: dfir_iris_output

- name: Show Docker Compose output
  ansible.builtin.debug:
    msg: |
      DFIR_IRIS: {{ dfir_iris_output | default('No output captured') }}

- name: Ensure Portainer container is absent on CICMS
  community.docker.docker_container:
    name: "{{ cicms_portainer_container }}"
    state: absent
  failed_when: false

- name: Unmount SMB share
  ansible.builtin.mount:
    path: "{{ cicms_compose_source.mount_point }}"
    state: unmounted
